<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 480" width="500" height="480">
  <!-- Transparent background — no rect fill -->

  <!-- =====================================================
       MAIN BRANCH STRUCTURE — golden-brown stems
       ===================================================== -->
  <!-- Primary main stem curving up-right -->
  <path d="M 60,440 C 80,400 100,360 130,310 C 160,260 195,220 235,185 C 270,155 310,130 340,110"
        fill="none" stroke="#8B5E15" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Secondary stem branching left at mid-point -->
  <path d="M 175,280 C 150,260 120,240 95,210 C 75,185 60,165 50,145"
        fill="none" stroke="#8B5E15" stroke-width="3.8" stroke-linecap="round"/>
  <!-- Tertiary stem going lower-left -->
  <path d="M 130,320 C 105,310 80,295 60,275"
        fill="none" stroke="#9B6E20" stroke-width="3" stroke-linecap="round"/>
  <!-- Small twig top-right -->
  <path d="M 340,110 C 355,95 370,82 390,70"
        fill="none" stroke="#9B6E20" stroke-width="3" stroke-linecap="round"/>
  <!-- Another twig mid-right -->
  <path d="M 270,160 C 290,145 315,130 330,118"
        fill="none" stroke="#9B6E20" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Small stem for leaf cluster lower -->
  <path d="M 155,300 C 140,288 122,275 108,258"
        fill="none" stroke="#9B6E20" stroke-width="2.5" stroke-linecap="round"/>

  <!-- =====================================================
       LEAVES — olive-green with veining
       ===================================================== -->
  <!-- Leaf 1 — large, near bottom of main stem, curving right -->
  <g transform="translate(155,305) rotate(-25)">
    <path d="M 0,0 C -8,-20 -5,-50 8,-65 C 15,-72 28,-68 30,-55 C 32,-42 22,-18 0,0 Z"
          fill="#6B7A3A" stroke="#556030" stroke-width="1"/>
    <!-- vein -->
    <path d="M 0,0 C 8,-20 18,-42 22,-55" fill="none" stroke="#8A9A4A" stroke-width="0.9" opacity="0.7"/>
    <path d="M 8,-20 C 5,-22 2,-26 4,-30" fill="none" stroke="#8A9A4A" stroke-width="0.6" opacity="0.5"/>
    <path d="M 14,-38 C 11,-40 9,-44 10,-47" fill="none" stroke="#8A9A4A" stroke-width="0.6" opacity="0.5"/>
  </g>

  <!-- Leaf 2 — medium, curving left from secondary stem -->
  <g transform="translate(95,210) rotate(35)">
    <path d="M 0,0 C 5,-15 12,-35 8,-52 C 5,-62 -8,-62 -14,-50 C -20,-38 -14,-16 0,0 Z"
          fill="#7A8B42" stroke="#5A6830" stroke-width="1"/>
    <path d="M 0,0 C -4,-16 -8,-36 -8,-48" fill="none" stroke="#8A9A4A" stroke-width="0.9" opacity="0.7"/>
    <path d="M -4,-18 C -7,-20 -10,-24 -9,-28" fill="none" stroke="#8A9A4A" stroke-width="0.6" opacity="0.5"/>
  </g>

  <!-- Leaf 3 — near top-right, curving elegantly -->
  <g transform="translate(305,132) rotate(-55)">
    <path d="M 0,0 C -6,-18 -4,-45 10,-58 C 17,-64 28,-58 28,-45 C 28,-30 18,-12 0,0 Z"
          fill="#6B7A3A" stroke="#556030" stroke-width="1"/>
    <path d="M 0,0 C 8,-18 18,-38 20,-48" fill="none" stroke="#8A9A4A" stroke-width="0.9" opacity="0.7"/>
    <path d="M 8,-20 C 6,-22 4,-26 5,-30" fill="none" stroke="#8A9A4A" stroke-width="0.6" opacity="0.5"/>
  </g>

  <!-- Leaf 4 — small, top twig -->
  <g transform="translate(375,76) rotate(-70)">
    <path d="M 0,0 C -4,-12 -3,-30 6,-40 C 11,-46 20,-42 20,-32 C 20,-22 12,-8 0,0 Z"
          fill="#8A9A4A" stroke="#6B7A3A" stroke-width="0.8"/>
    <path d="M 0,0 C 5,-12 12,-26 14,-34" fill="none" stroke="#9BAA55" stroke-width="0.7" opacity="0.6"/>
  </g>

  <!-- Leaf 5 — mid secondary branch, pointing down-left -->
  <g transform="translate(62,148) rotate(60)">
    <path d="M 0,0 C -5,-14 -4,-35 6,-46 C 12,-52 22,-48 22,-36 C 22,-24 14,-8 0,0 Z"
          fill="#7A8B42" stroke="#5A6830" stroke-width="0.9"/>
    <path d="M 0,0 C 5,-14 12,-30 14,-38" fill="none" stroke="#8A9A4A" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Leaf 6 — additional small leaf near lower-left branch -->
  <g transform="translate(62,278) rotate(50)">
    <path d="M 0,0 C -3,-10 -2,-26 5,-34 C 9,-40 17,-36 17,-26 C 17,-16 10,-5 0,0 Z"
          fill="#8A9A4A" stroke="#6B7A3A" stroke-width="0.8"/>
    <path d="M 0,0 C 4,-10 9,-22 10,-28" fill="none" stroke="#9BAA55" stroke-width="0.6" opacity="0.5"/>
  </g>

  <!-- =====================================================
       FLOWER 1 — LARGE, near top of main stem (~340,110)
       Full magnolia bloom, facing viewer, cream petals
       ===================================================== -->
  <g transform="translate(340,105)">
    <!-- Back petals (slightly darker, behind) -->
    <!-- Petal back-left -->
    <path d="M 0,-8 C -10,-30 -22,-60 -15,-80 C -10,-92 0,-90 5,-78 C 12,-60 8,-30 0,-8 Z"
          fill="#DDD4A0" stroke="#C8C090" stroke-width="0.8" opacity="0.85"/>
    <!-- Petal back-right -->
    <path d="M 0,-8 C 10,-30 22,-60 15,-80 C 10,-92 0,-90 -5,-78 C -12,-60 -8,-30 0,-8 Z"
          fill="#DDD4A0" stroke="#C8C090" stroke-width="0.8" opacity="0.85"/>
    <!-- Petal back-far-left -->
    <path d="M -5,-5 C -28,-20 -58,-30 -72,-22 C -82,-15 -78,-5 -66,2 C -52,10 -28,8 -5,-5 Z"
          fill="#E0D8A8" stroke="#C8C090" stroke-width="0.8" opacity="0.85"/>
    <!-- Petal back-far-right -->
    <path d="M 5,-5 C 28,-20 58,-30 72,-22 C 82,-15 78,-5 66,2 C 52,10 28,8 5,-5 Z"
          fill="#E0D8A8" stroke="#C8C090" stroke-width="0.8" opacity="0.85"/>

    <!-- Main front petals (lighter, more ivory) -->
    <!-- Center-top petal -->
    <path d="M 0,-10 C -12,-35 -18,-68 -8,-88 C -4,-98 4,-98 8,-88 C 18,-68 12,-35 0,-10 Z"
          fill="#F5EABB" stroke="#D4C88A" stroke-width="0.8"/>
    <!-- Shade line on center top petal -->
    <path d="M 0,-10 C -3,-35 -5,-65 -3,-85" fill="none" stroke="#DDD0A0" stroke-width="0.7" opacity="0.6"/>

    <!-- Left petal -->
    <path d="M -8,-8 C -30,-20 -60,-25 -75,-15 C -86,-7 -84,5 -72,10 C -58,16 -30,10 -8,-8 Z"
          fill="#F5EABB" stroke="#D4C88A" stroke-width="0.8"/>
    <path d="M -8,-8 C -30,-14 -58,-14 -70,-8" fill="none" stroke="#DDD0A0" stroke-width="0.7" opacity="0.6"/>

    <!-- Right petal -->
    <path d="M 8,-8 C 30,-20 60,-25 75,-15 C 86,-7 84,5 72,10 C 58,16 30,10 8,-8 Z"
          fill="#F5EABB" stroke="#D4C88A" stroke-width="0.8"/>
    <path d="M 8,-8 C 30,-14 58,-14 70,-8" fill="none" stroke="#DDD0A0" stroke-width="0.7" opacity="0.6"/>

    <!-- Lower-left petal -->
    <path d="M -6,0 C -22,15 -45,35 -50,50 C -54,62 -46,70 -36,66 C -24,60 -12,40 -6,0 Z"
          fill="#EDE0A0" stroke="#D4C88A" stroke-width="0.8"/>
    <path d="M -6,0 C -18,18 -35,38 -38,52" fill="none" stroke="#D8D090" stroke-width="0.7" opacity="0.6"/>

    <!-- Lower-right petal -->
    <path d="M 6,0 C 22,15 45,35 50,50 C 54,62 46,70 36,66 C 24,60 12,40 6,0 Z"
          fill="#EDE0A0" stroke="#D4C88A" stroke-width="0.8"/>
    <path d="M 6,0 C 18,18 35,38 38,52" fill="none" stroke="#D8D090" stroke-width="0.7" opacity="0.6"/>

    <!-- Center stamen cluster -->
    <circle cx="0" cy="-2" r="10" fill="#C8A830" stroke="#A07820" stroke-width="1"/>
    <circle cx="0" cy="-2" r="6" fill="#D4B840" stroke="#B08828" stroke-width="0.8"/>
    <!-- Stamen dots -->
    <circle cx="-3" cy="-6" r="1.2" fill="#8B6010"/>
    <circle cx="3" cy="-6" r="1.2" fill="#8B6010"/>
    <circle cx="0" cy="-8" r="1.2" fill="#8B6010"/>
    <circle cx="-4" cy="-1" r="1.0" fill="#8B6010"/>
    <circle cx="4" cy="-1" r="1.0" fill="#8B6010"/>
  </g>

  <!-- =====================================================
       FLOWER 2 — MEDIUM, mid-branch (~230,188)
       More open/angled, slightly turned
       ===================================================== -->
  <g transform="translate(228,188)">
    <!-- Back petals -->
    <path d="M 0,-6 C -8,-24 -16,-48 -10,-64 C -6,-74 2,-72 6,-62 C 12,-48 8,-24 0,-6 Z"
          fill="#DDD4A0" stroke="#C8C090" stroke-width="0.8" opacity="0.8"/>
    <path d="M 0,-6 C 8,-24 16,-48 10,-64 C 6,-74 -2,-72 -6,-62 C -12,-48 -8,-24 0,-6 Z"
          fill="#DDD4A0" stroke="#C8C090" stroke-width="0.8" opacity="0.8"/>
    <path d="M -4,-4 C -22,-14 -46,-20 -56,-14 C -64,-9 -62,-1 -52,4 C -40,10 -20,6 -4,-4 Z"
          fill="#E0D8A8" stroke="#C8C090" stroke-width="0.7" opacity="0.8"/>
    <path d="M 4,-4 C 22,-14 46,-20 56,-14 C 64,-9 62,-1 52,4 C 40,10 20,6 4,-4 Z"
          fill="#E0D8A8" stroke="#C8C090" stroke-width="0.7" opacity="0.8"/>

    <!-- Front petals -->
    <path d="M 0,-8 C -9,-28 -14,-54 -6,-70 C -2,-78 4,-78 8,-68 C 14,-54 9,-28 0,-8 Z"
          fill="#F5EABB" stroke="#D4C88A" stroke-width="0.8"/>
    <path d="M 0,-8 C -2,-28 -3,-52 -2,-66" fill="none" stroke="#DDD0A0" stroke-width="0.7" opacity="0.55"/>

    <path d="M -6,-6 C -22,-14 -46,-18 -58,-10 C -66,-4 -64,4 -54,8 C -42,12 -22,6 -6,-6 Z"
          fill="#F5EABB" stroke="#D4C88A" stroke-width="0.7"/>
    <path d="M 6,-6 C 22,-14 46,-18 58,-10 C 66,-4 64,4 54,8 C 42,12 22,6 6,-6 Z"
          fill="#F5EABB" stroke="#D4C88A" stroke-width="0.7"/>

    <path d="M -5,0 C -16,12 -34,28 -38,40 C -42,50 -36,56 -28,52 C -18,46 -8,30 -5,0 Z"
          fill="#EDE0A0" stroke="#D4C88A" stroke-width="0.7"/>
    <path d="M 5,0 C 16,12 34,28 38,40 C 42,50 36,56 28,52 C 18,46 8,30 5,0 Z"
          fill="#EDE0A0" stroke="#D4C88A" stroke-width="0.7"/>

    <!-- Center -->
    <circle cx="0" cy="-1" r="8" fill="#C8A830" stroke="#A07820" stroke-width="0.9"/>
    <circle cx="0" cy="-1" r="5" fill="#D4B840" stroke="#B08828" stroke-width="0.7"/>
    <circle cx="-2" cy="-4" r="1" fill="#8B6010"/>
    <circle cx="2" cy="-4" r="1" fill="#8B6010"/>
    <circle cx="0" cy="-5.5" r="1" fill="#8B6010"/>
    <circle cx="-3" cy="-0.5" r="0.9" fill="#8B6010"/>
    <circle cx="3" cy="-0.5" r="0.9" fill="#8B6010"/>
  </g>

  <!-- =====================================================
       FLOWER 3 — SMALLER bud/partial bloom, secondary branch (~50,148)
       Only 4 petals showing, partially open
       ===================================================== -->
  <g transform="translate(52,148)">
    <!-- Petals partially open -->
    <path d="M 0,-5 C -6,-18 -10,-38 -6,-50 C -3,-58 4,-58 6,-48 C 10,-36 6,-18 0,-5 Z"
          fill="#F5EABB" stroke="#D4C88A" stroke-width="0.8"/>
    <path d="M 0,-5 C -2,-18 -2,-38 -1,-48" fill="none" stroke="#DDD0A0" stroke-width="0.6" opacity="0.55"/>

    <path d="M -4,-4 C -16,-10 -34,-14 -42,-8 C -48,-4 -46,2 -38,6 C -28,10 -14,4 -4,-4 Z"
          fill="#EDE0A0" stroke="#D4C88A" stroke-width="0.7"/>
    <path d="M 4,-4 C 16,-10 34,-14 42,-8 C 48,-4 46,2 38,6 C 28,10 14,4 4,-4 Z"
          fill="#EDE0A0" stroke="#D4C88A" stroke-width="0.7"/>
    <path d="M -3,2 C -10,10 -20,22 -22,30 C -24,36 -20,40 -14,36 C -8,32 -4,20 -3,2 Z"
          fill="#F5EABB" stroke="#D4C88A" stroke-width="0.7"/>
    <path d="M 3,2 C 10,10 20,22 22,30 C 24,36 20,40 14,36 C 8,32 4,20 3,2 Z"
          fill="#F5EABB" stroke="#D4C88A" stroke-width="0.7"/>

    <!-- Center smaller -->
    <circle cx="0" cy="0" r="6.5" fill="#C8A830" stroke="#A07820" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="4" fill="#D4B840" stroke="#B08828" stroke-width="0.6"/>
    <circle cx="-1.5" cy="-2.5" r="0.9" fill="#8B6010"/>
    <circle cx="1.5" cy="-2.5" r="0.9" fill="#8B6010"/>
    <circle cx="0" cy="-3.5" r="0.9" fill="#8B6010"/>
  </g>

  <!-- =====================================================
       BUD — small unopened bud on top twig (~390,70)
       ===================================================== -->
  <g transform="translate(392,68)">
    <!-- Bud sepals -->
    <path d="M -4,0 C -6,-8 -5,-22 0,-28 C 3,-22 4,-8 4,0 Z"
          fill="#6B7A3A" stroke="#556030" stroke-width="0.8"/>
    <!-- Bud petals peeking out -->
    <path d="M -3,-10 C -5,-18 -4,-26 0,-28 C 2,-24 3,-18 3,-10 Z"
          fill="#F5EABB" stroke="#D4C88A" stroke-width="0.7" opacity="0.9"/>
    <path d="M 0,-12 C -2,-20 -1,-26 0,-28 C 1,-26 2,-20 2,-12 Z"
          fill="#EDE0A0" stroke="#D4C88A" stroke-width="0.6" opacity="0.9"/>
  </g>

  <!-- =====================================================
       ADDITIONAL SMALL BUD on mid-right twig (~330,118)
       ===================================================== -->
  <g transform="translate(328,120)">
    <path d="M -3,0 C -5,-7 -4,-18 0,-24 C 2,-18 3,-7 3,0 Z"
          fill="#7A8B42" stroke="#556030" stroke-width="0.7"/>
    <path d="M -2,-8 C -4,-14 -3,-21 0,-24 C 1,-20 2,-14 2,-8 Z"
          fill="#F5EABB" stroke="#D4C88A" stroke-width="0.6" opacity="0.85"/>
  </g>

</svg>
